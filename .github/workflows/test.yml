name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Start InterSystems IRIS via Docker
        run: |
          docker run -d -p 1972:1972 -e IRIS_PASSWORD=SYS -e IRIS_USERNAME=SuperUser intersystemsdc/iris-community:latest
          echo "Aguardando o InterSystems IRIS inicializar..."
          sleep 25 

      - name: Install Hatch
        run: pip install hatch

      - name: Lint
        if: matrix.python-version == '3.10' && runner.os == 'Linux'
        run: hatch run fmt-check

      - name: Run tests
        env: 
          IRIS_CONNECTION_STRING: "127.0.0.1:1972/USER"
          IRIS_USERNAME: "SuperUser"
          IRIS_PASSWORD: "SYS"
        run: hatch run test:all